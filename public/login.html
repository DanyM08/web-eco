<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – BlueCode</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</head>
<body>

<section class="login-page">
    <div class="login-card">
        <div class="logo">Blue<span>Code</span></div>

        <form id="form-login">
            <h2>Iniciar sesión</h2>
            <p class="sub">Bienvenido de vuelta</p>

            <div class="campo">
                <label for="email-login">Correo electrónico</label>
                <input type="email" id="email-login" placeholder="correo@ejemplo.com" required>
            </div>
            <div class="campo">
                <label for="pass-login">Contraseña</label>
                <input type="password" id="pass-login" placeholder="••••••••" required>
            </div>
            <button type="submit">Entrar</button>
        </form>

        <hr style="margin: 24px 0; border: 0; border-top: 1px solid #ddd;">

        <form id="form-reg">
            <h3>Crear cuenta</h3>
            <div class="campo">
                <label for="nombre-reg">Nombre completo</label>
                <input type="text" id="nombre-reg" placeholder="Tu nombre" required>
            </div>
            <div class="campo">
                <label for="email-reg">Correo electrónico</label>
                <input type="email" id="email-reg" placeholder="correo@ejemplo.com" required>
            </div>
            <div class="campo">
                <label for="pass-reg">Contraseña</label>
                <input type="password" id="pass-reg" placeholder="••••••••" required>
            </div>
            <button type="submit">Registrarse</button>
        </form>
    </div>
</section>

<script>
    const API_URL = 'http://localhost/ecofloat/public/api';

    document.getElementById('form-login').addEventListener('submit', function(e) {
        e.preventDefault();

        const datos = {
            email: document.getElementById('email-login').value,
            password: document.getElementById('pass-login').value
        };

        fetch(`${API_URL}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datos)
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'ok') {
                alert('Bienvenido, ' + data.usuario);
                window.location.href = 'index.html';
            } else {
                alert('Error: ' + data.mensaje);
            }
        })
        .catch(err => console.error('Error:', err));
    });

    document.getElementById('form-reg').addEventListener('submit', function(e) {
        e.preventDefault();

        const datos = {
            nombre: document.getElementById('nombre-reg').value,
            email: document.getElementById('email-reg').value,
            password: document.getElementById('pass-reg').value
        };

        fetch(`${API_URL}/registro`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datos)
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'ok') {
                alert(data.mensaje);
                document.getElementById('form-reg').reset();
            } else {
                alert('Error: ' + data.mensaje);
            }
        })
        .catch(err => console.error('Error:', err));
    });
</script>

</body>
</html>
